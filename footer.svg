<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes scan { 0%{transform:translateY(-180px)} 100%{transform:translateY(180px)} }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes fadeIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
      @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      
      /* Contribution cells with staggered animation */
      .cell { animation: fadeIn 0.3s ease both; }
      .c0 { fill: #0d1117; }
      .c1 { fill: #0e4429; }
      .c2 { fill: #006d32; }
      .c3 { fill: #26a641; }
      .c4 { fill: #39d353; }
      
      .blink { animation: blink 1s step-end infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      .scan { animation: scan 5s linear infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      
      /* Staggered cells */
      .d1{animation-delay:0.02s} .d2{animation-delay:0.04s} .d3{animation-delay:0.06s}
      .d4{animation-delay:0.08s} .d5{animation-delay:0.10s} .d6{animation-delay:0.12s}
      .d7{animation-delay:0.14s} .d8{animation-delay:0.16s} .d9{animation-delay:0.18s}
      .d10{animation-delay:0.20s} .d11{animation-delay:0.22s} .d12{animation-delay:0.24s}
      .d13{animation-delay:0.26s} .d14{animation-delay:0.28s} .d15{animation-delay:0.30s}
      .d16{animation-delay:0.32s} .d17{animation-delay:0.34s} .d18{animation-delay:0.36s}
      .d19{animation-delay:0.38s} .d20{animation-delay:0.40s} .d21{animation-delay:0.42s}
      
      .lantern { animation: float 3s ease-in-out infinite; transform-origin: 50% 0%; }
      .lantern2 { animation: float 3s 1.5s ease-in-out infinite; transform-origin: 50% 0%; }
    </style>
    <filter id="gf">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gf2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#1a1228"/>
    </linearGradient>
  </defs>

