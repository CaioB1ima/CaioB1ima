<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-5px)} }
      @keyframes glow-pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes slide-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
      @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes scan { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
      
      .t1{animation:slide-up 0.4s 0.1s ease both}
      .t2{animation:slide-up 0.4s 0.2s ease both}
      .t3{animation:slide-up 0.4s 0.3s ease both}
      .t4{animation:slide-up 0.4s 0.4s ease both}
      .t5{animation:slide-up 0.4s 0.5s ease both}
      .t6{animation:slide-up 0.4s 0.6s ease both}
      .t7{animation:slide-up 0.4s 0.7s ease both}
      .t8{animation:slide-up 0.4s 0.8s ease both}
      .t9{animation:slide-up 0.4s 0.9s ease both}
      .t10{animation:slide-up 0.4s 1.0s ease both}
      .t11{animation:slide-up 0.4s 1.1s ease both}
      .t12{animation:slide-up 0.4s 1.2s ease both}
      .f1{animation:float 3s 0s ease-in-out infinite}
      .f2{animation:float 3s 0.3s ease-in-out infinite}
      .f3{animation:float 3s 0.6s ease-in-out infinite}
      .f4{animation:float 3s 0.9s ease-in-out infinite}
      .f5{animation:float 3s 1.2s ease-in-out infinite}
      .f6{animation:float 3s 1.5s ease-in-out infinite}
      .gp{animation:glow-pulse 2s ease-in-out infinite}
      .scan{animation:scan 5s linear infinite}
    </style>
    <filter id="g">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1228"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="220" fill="url(#bg3)"/>
  <rect class="scan" x="0" width="800" height="2" fill="white" opacity="0.03"/>

  <!-- Section title -->
  <text x="30" y="35" font-family="'Press Start 2P', monospace" font-size="11" fill="#e8c87a" filter="url(#g)">▶ TECH.STACK</text>
  <rect x="30" y="42" width="740" height="1" fill="#7ecfff" opacity="0.3"/>

  <!-- Row 1: Languages -->
  <text x="30" y="65" font-family="'Press Start 2P', monospace" font-size="7" fill="#7ecfff" opacity="0.7">// LANGUAGES</text>

  <!-- Java -->
  <g class="t1 f1" transform="translate(30,75)">
    <rect width="68" height="30" fill="#1a2a0a" rx="2"/>
    <rect width="68" height="30" fill="none" stroke="#ED8B00" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="34" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#ED8B00">☕</text>
    <text x="34" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#ED8B00">JAVA</text>
  </g>
  <!-- Python -->
  <g class="t2 f2" transform="translate(108,75)">
    <rect width="80" height="30" fill="#0a1a2a" rx="2"/>
    <rect width="80" height="30" fill="none" stroke="#3670A0" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="40" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#ffdd54">🐍</text>
    <text x="40" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#3670A0">PYTHON</text>
  </g>
  <!-- TypeScript -->
  <g class="t3 f3" transform="translate(198,75)">
    <rect width="96" height="30" fill="#001a3a" rx="2"/>
    <rect width="96" height="30" fill="none" stroke="#007ACC" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="48" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#007ACC">TS</text>
    <text x="48" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#007ACC">TYPESCRIPT</text>
  </g>
  <!-- C# -->
  <g class="t4 f4" transform="translate(304,75)">
    <rect width="56" height="30" fill="#0a2a0a" rx="2"/>
    <rect width="56" height="30" fill="none" stroke="#239120" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="28" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#239120">C#</text>
    <text x="28" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#239120">C#</text>
  </g>
  <!-- PHP -->
  <g class="t5 f5" transform="translate(370,75)">
    <rect width="56" height="30" fill="#1a0a2a" rx="2"/>
    <rect width="56" height="30" fill="none" stroke="#777BB4" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="28" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#777BB4">🐘</text>
    <text x="28" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#777BB4">PHP</text>
  </g>
  <!-- HTML/CSS -->
  <g class="t6 f6" transform="translate(436,75)">
    <rect width="80" height="30" fill="#2a0a0a" rx="2"/>
    <rect width="80" height="30" fill="none" stroke="#E34F26" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="40" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#E34F26">🌐</text>
    <text x="40" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#E34F26">HTML/CSS</text>
  </g>

  <!-- Row 2: Frameworks -->
  <text x="30" y="125" font-family="'Press Start 2P', monospace" font-size="7" fill="#7ecfff" opacity="0.7">// FRAMEWORKS &amp; TOOLS</text>
  
  <!-- React -->
  <g class="t7 f2" transform="translate(30,135)">
    <rect width="68" height="30" fill="#0a1a2a" rx="2"/>
    <rect width="68" height="30" fill="none" stroke="#61DAFB" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="34" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#61DAFB">⚛</text>
    <text x="34" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#61DAFB">REACT</text>
  </g>
  <!-- Node.js -->
  <g class="t8 f3" transform="translate(108,135)">
    <rect width="72" height="30" fill="#0a2a0a" rx="2"/>
    <rect width="72" height="30" fill="none" stroke="#6DA55F" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="36" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#6DA55F">⬡</text>
    <text x="36" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#6DA55F">NODE.JS</text>
  </g>
  <!-- Supabase -->
  <g class="t9 f4" transform="translate(190,135)">
    <rect width="84" height="30" fill="#0a2a1a" rx="2"/>
    <rect width="84" height="30" fill="none" stroke="#3ECF8E" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="42" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#3ECF8E">⚡</text>
    <text x="42" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#3ECF8E">SUPABASE</text>
  </g>
  <!-- Figma -->
  <g class="t10 f5" transform="translate(284,135)">
    <rect width="64" height="30" fill="#2a0a0a" rx="2"/>
    <rect width="64" height="30" fill="none" stroke="#F24E1E" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="32" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#F24E1E">✏</text>
    <text x="32" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#F24E1E">FIGMA</text>
  </g>
  <!-- Power BI -->
  <g class="t11 f6" transform="translate(358,135)">
    <rect width="80" height="30" fill="#2a1a0a" rx="2"/>
    <rect width="80" height="30" fill="none" stroke="#F2C811" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="40" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#F2C811">📊</text>
    <text x="40" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#F2C811">POWER BI</text>
  </g>
  <!-- Git -->
  <g class="t12 f1" transform="translate(448,135)">
    <rect width="56" height="30" fill="#2a0a0a" rx="2"/>
    <rect width="56" height="30" fill="none" stroke="#F05033" stroke-width="1" rx="2" opacity="0.8"/>
    <text x="28" y="12" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#F05033">◉</text>
    <text x="28" y="24" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="6" fill="#F05033">GIT</text>
  </g>
  
  <!-- Decorative right side pixel art: vending machine -->
  <g transform="translate(600, 55)">
    <!-- Machine body -->
    <rect x="0" y="0" width="60" height="120" fill="#1a2a4a" rx="2"/>
    <rect x="2" y="2" width="56" height="116" fill="none" stroke="#7ecfff" stroke-width="1" opacity="0.4" rx="1"/>
    <!-- Screen/display -->
    <rect x="8" y="8" width="44" height="30" fill="#0a3a6a" rx="1"/>
    <rect x="10" y="10" width="40" height="26" fill="#1a6aaa" rx="1"/>
    <!-- Screen content -->
    <rect x="12" y="12" width="20" height="2" fill="#7ecfff" opacity="0.8"/>
    <rect x="12" y="16" width="30" height="2" fill="#aaffaa" opacity="0.6"/>
    <rect x="12" y="20" width="15" height="2" fill="#e8c87a" opacity="0.7"/>
    <!-- Items rows -->
    <rect x="6" y="44" width="48" height="28" fill="#111" rx="1"/>
    <!-- Row 1 items -->
    <rect x="8" y="46" width="10" height="12" fill="#ff6060" rx="1"/>
    <rect x="20" y="46" width="10" height="12" fill="#60aaff" rx="1"/>
    <rect x="32" y="46" width="10" height="12" fill="#ffaa30" rx="1"/>
    <rect x="44" y="46" width="8" height="12" fill="#60ff80" rx="1"/>
    <!-- Row 2 items -->
    <rect x="8" y="60" width="10" height="10" fill="#aa60ff" rx="1"/>
    <rect x="20" y="60" width="10" height="10" fill="#ff60aa" rx="1"/>
    <rect x="32" y="60" width="10" height="10" fill="#60ffff" rx="1"/>
    <rect x="44" y="60" width="8" height="10" fill="#ffff60" rx="1"/>
    <!-- Coin slot -->
    <rect x="20" y="78" width="20" height="4" fill="#333" rx="1"/>
    <rect x="22" y="79" width="16" height="2" fill="#555"/>
    <!-- Button panel -->
    <rect x="10" y="88" width="40" height="24" fill="#0a1a2a" rx="1"/>
    <rect x="14" y="92" width="6" height="6" fill="#e8c87a" rx="1"/>
    <rect x="24" y="92" width="6" height="6" fill="#7ecfff" rx="1"/>
    <rect x="34" y="92" width="6" height="6" fill="#ff6060" rx="1"/>
    <rect x="14" y="102" width="6" height="6" fill="#aaffaa" rx="1"/>
    <rect x="24" y="102" width="6" height="6" fill="#ff60aa" rx="1"/>
    <rect x="34" y="102" width="6" height="6" fill="#aa60ff" rx="1"/>
  </g>

  <!-- Bottom glow line -->
  <rect x="0" y="215" width="800" height="5" fill="#7ecfff" opacity="0.1"/>
</svg>
